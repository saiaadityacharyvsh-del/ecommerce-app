{% extends "base.html" %}
{% block title %}User Login - MyShop{% endblock %}
{% block content %}
<div class="row g-0 shadow-lg rounded-4 overflow-hidden" style="max-width: 960px; margin: 0 auto;">
  
  <!-- Left: Beautiful Gradient Panel -->
  <div class="col-lg-5 d-none d-lg-flex align-items-center justify-content-center text-white" 
       style="background: linear-gradient(135deg, #0d6efd, #6610f2); padding: 3rem;">
    <div class="text-center">
      <h2 class="fw-bold mb-3">Welcome Back!</h2>
      <p class="mb-4 opacity-75">Login to explore amazing products and exclusive deals.</p>
      <div class="fs-1">🛍️</div>
    </div>
  </div>

  <!-- Right: Login Form -->
  <div class="col-lg-7 bg-white p-5">
    <div class="mb-4">
      <h1 class="h4 fw-bold mb-1">User Login</h1>
      <p class="text-muted small">Sign in to continue shopping</p>
    </div>

    <form method="POST" action="/user-login" class="row g-3">
      <div class="col-12">
        <label class="form-label fw-medium">Email Address</label>
        <input type="email" name="email" class="form-control form-control-lg" placeholder="you@example.com" required>
      </div>
      <div class="col-12">
        <label class="form-label fw-medium">Password</label>
        <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
      </div>
      <div class="col-12 mt-2">
        <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-semibold">Login to MyShop</button>
      </div>
    </form>

    <div class="text-center mt-4">
      <div class="mb-1">
        <span class="text-muted">Don't have an account?</span>
        <a href="/user-register" class="fw-semibold text-decoration-none">Create one now</a>
      </div>
      <div>
        <span class="text-muted small">Are you an admin?</span>
        <a href="/admin-login" class="small fw-semibold text-decoration-none">Login here</a>
      </div>
    </div>
  </div>

</div>
{% endblock %}
