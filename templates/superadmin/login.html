{% extends "base.html" %}
{% block title %}Super Admin Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">

    <div class="card border-danger shadow">
      <div class="card-header bg-dark text-white text-center">
        <h4 class="mb-0">🔒 Super Admin Login</h4>
        <small class="text-warning">Owner Access Only</small>
      </div>
      <div class="card-body p-4">
        <form method="POST" action="/superadmin-login">
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="superadmin@example.com" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-danger w-100">Login as Super Admin</button>
        </form>
      </div>
      <div class="card-footer text-center">
        <a href="/admin-login" class="text-decoration-none">← Back to Normal Admin Login</a>
      </div>
    </div>

    <div class="text-center mt-3">
      <small class="text-muted">This login is restricted to platform owners only.</small>
    </div>

  </div>
</div>
{% endblock %}
