{% extends "base.html" %}
{% block title %}Add Product - Admin{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-8 col-lg-9">
    <div class="card card-soft shadow-sm p-4">
      <div class="d-flex flex-column flex-md-row align-items-center justify-content-between gap-3 mb-3">
        <div>
          <h1 class="h4 mb-1">Add New Product</h1>
          <p class="text-muted mb-0">Add items to your store catalog with a crisp product form.</p>
        </div>
        <a class="btn btn-secondary" href="/admin/item-list">Back to Products</a>
      </div>

      <form method="POST" action="/admin/add-item" enctype="multipart/form-data" class="row g-3">
        <div class="col-12">
          <label class="form-label">Product Name</label>
          <input type="text" name="name" class="form-control" required>
        </div>
        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea name="description" rows="4" class="form-control" required></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Category</label>
          <input type="text" name="category" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Price</label>
          <input type="number" step="0.01" name="price" class="form-control" required>
        </div>
        <div class="col-12">
          <label class="form-label">Product Image</label>
          <input type="file" name="image" class="form-control" accept="image/*" required>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary w-100">Add Product</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
