{% extends "base.html" %}
{% block title %}Forgot Password - MyShop{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-5">
    <div class="card card-soft shadow-sm p-4">
      <h1 class="h4 mb-3">Forgot Password</h1>
      <p class="text-muted mb-3">Enter your admin email and we will send a reset OTP if the account exists.</p>
      <form method="POST" action="/forgot-password" class="row g-3">
        <div class="col-12">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary w-100">Send Reset OTP</button>
        </div>
      </form>
      <div class="mt-3 text-center">
        <a href="/admin-login">Back to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
