{% extends "base.html" %}
{% block title %}Admin Profile - MyShop{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-8 col-lg-9">
    <div class="card card-soft shadow-sm p-4">
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
          <h1 class="h4 mb-1">Admin Profile</h1>
          <p class="text-muted mb-0">Manage your account details and contact information.</p>
        </div>
        <a class="btn btn-secondary" href="/admin/dashboard">Back to Dashboard</a>
      </div>
      <dl class="row">
        <dt class="col-sm-4">Name</dt>
        <dd class="col-sm-8">{{ admin_name }}</dd>

        <dt class="col-sm-4">Email</dt>
        <dd class="col-sm-8">{{ admin_email }}</dd>
      </dl>
    </div>
  </div>
</div>
{% endblock %}
