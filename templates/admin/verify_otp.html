{% extends "base.html" %}
{% block title %}Verify OTP - MyShop{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-5">
    <div class="card card-soft shadow-sm p-4">
      <h1 class="h4 mb-3">Verify OTP</h1>
      <form method="POST" action="/verify-otp" class="row g-3">
        <div class="col-12">
          <label class="form-label">Enter OTP</label>
          <input type="text" name="otp" class="form-control" required>
        </div>
        <div class="col-12">
          <label class="form-label">Create Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary w-100">Verify & Register</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
