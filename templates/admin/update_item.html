{% extends "base.html" %}
{% block title %}Update Product - Admin{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-8 col-lg-9">
    <div class="card card-soft shadow-sm p-4">
      <div class="d-flex flex-column flex-md-row align-items-center justify-content-between gap-3 mb-3">
        <div>
          <h1 class="h4 mb-1">Update Product</h1>
          <p class="text-muted mb-0">Edit the product details and replace the image if needed.</p>
        </div>
        <a class="btn btn-secondary" href="/admin/item-list">Back to Product List</a>
      </div>
      <form method="POST" action="/admin/update-item/{{ product.product_id }}" enctype="multipart/form-data" class="row g-3">
        <div class="col-12">
          <label class="form-label">Product Name</label>
          <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
        </div>
        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea name="description" rows="4" class="form-control" required>{{ product.description }}</textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Category</label>
          <input type="text" name="category" class="form-control" value="{{ product.category }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Price</label>
          <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price }}" required>
        </div>
        <div class="col-12">
          <label class="form-label">Current Image</label>
          <div class="mb-3"><img src="{{ url_for('static', filename='upload/product_images/' ~ product.image) }}" class="img-fluid rounded-3" width="180" alt="{{ product.name }}"></div>
        </div>
        <div class="col-12">
          <label class="form-label">Choose New Image (Optional)</label>
          <input type="file" name="image" class="form-control" accept="image/*">
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary w-100">Update Product</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
